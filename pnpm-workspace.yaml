minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - devalue
  - svelte
  - "@sveltejs/*"
  - "@sveltia/*"
  - lexical
  - "@lexical/*"
  - dompurify # to update to 3.3.2 that fixes a security vulnerability

onlyBuiltDependencies:
  - "@parcel/watcher"
  - es5-ext
  - esbuild
  - svelte-preprocess

overrides:
  esbuild@<=0.24.2: ">=0.25.0"
  dompurify@<=3.3.1: ">=3.3.2" # waiting for database update
