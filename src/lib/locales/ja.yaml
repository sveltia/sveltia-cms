    nested_collections_unsupported: Sveltia CMS ではネストされたコレクションはまだサポートされていません。
    # {$prop} is the unsupported option name that will be ignored
    unsupported_ignored_option: '`{$prop}` オプションは Sveltia CMS ではサポートされていません。このオプションは無視されます。'
    # Don’t localize `picker_utc`, `input_timezone`, and `output_utc`
    conflicting_timezone_options: '`picker_utc` と新しいタイムゾーンオプション (`input_timezone` または `output_utc`) の両方が設定されています。新しいオプションが優先されます。設定から `picker_utc` を削除することを検討してください。'

