    invalid_object_field: Object フィールドは `fields` と `types` オプションを同時に持つことはできません。
    # Don’t localize `fields`, and `types`
    object_field_missing_fields: Object フィールドは `fields` または `types` オプションのいずれかを定義する必要があります。
    # {$collection}, {$file}, and {$field} are referenced names that could not be resolved
    relation_field_invalid_collection: 参照されている `{$collection}` コレクションは無効であるか定義されていません。
    relation_field_invalid_collection_file: 参照されている `{$file}` ファイルは無効であるか定義されていません。
    # Don’t localize `file`
    relation_field_missing_file_name: ファイルコレクションへの参照には `file` オプションを定義する必要があります。
    relation_field_invalid_value_field: 参照されている値フィールド `{$field}` は無効であるか定義されていません。
    unexpected: 予期せぬ問題

  # Warning messages (logged to console)
  warning:
    oauth_no_app_id: OAuth アプリケーション ID が定義されていません。ユーザーがログインするにはアクセストークンを入力する必要があります。
