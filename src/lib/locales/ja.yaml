# Inline validation error messages for form fields.

validation:
  # Required field missing
  value_missing: この項目は必須です。

  # Minimum value/count not met
  range_underflow:
    # {$min} is the minimum allowed value, already formatted for the input type
    datetime-local: 日時は {$min} かそれ以降でなければなりません。
    date: 日付は {$min} かそれ以降でなければなりません。
    time: 時刻は {$min} かそれ以降でなければなりません。
    number: 値は {$min} 以上でなければなりません。
    # {$min} is the minimum number of selected options
    select: |
      少なくとも {$min} 個の項目を選択してください。
    # {$min} is the minimum number of list items
    add: |
      少なくとも {$min} 個の項目を追加してください。

  # Maximum value/count exceeded
  range_overflow:
    # {$max} is the maximum allowed value, already formatted for the input type
    datetime-local: 日時は {$max} かそれ以前でなければなりません。
    date: 日付は {$max} かそれ以前でなければなりません。
    time: 時刻は {$max} かそれ以前でなければなりません。
    number: 値は {$max} 以下でなければなりません。
    # {$max} is the maximum number of selected options
    select: |
      これ以上選択できる項目はありません。最大は {$max} 個です。
    # {$max} is the maximum number of list items
    add: |
      これ以上追加できる項目はありません。最大は {$max} 個です。

  # String length constraints
  # {$min :integer} and {$max :integer} are character-count limits
  too_short: |
    少なくとも {$min} 文字は入力してください。
  too_long: |
    {$max} 文字を超える入力はできません。

  # Type validation errors
  type_mismatch:
    number: 数値を入力してください。
    email: 正しいメールアドレスを入力してください。
    url: 正しい URL を入力してください。

