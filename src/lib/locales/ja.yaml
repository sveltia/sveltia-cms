# ==============================================================================
# Configuration Validation
# ==============================================================================
# Error and warning messages for CMS configuration validation.

config:
  # Error count notice on entrance page
  # {$count} is the number of configuration errors found
  errors: |
    CMS 設定に問題が見つかりました。問題を解決してから再度お試しください。

  # Error location prefixes
  error_locator:
    # {$collection}, {$file}, {$component}, and {$field} are the offending config item names
    collection: '{$collection} コレクション'
    file: '{$file} ファイル'
    component: '{$component} コンポーネント'
    # Don’t localize `{$field}`
    field: '`{$field}` フィールド'

  # Configuration error messages
  error:
    no_secure_context: Sveltia CMS は HTTPS またはローカルホスト URL でのみ動作します。
    # {$count} is the number of insecure configuration file URLs
    insecure_urls: |
      .input {$count :integer}
      .match $count
        one {{ 設定ファイルの URL は HTTPS プロトコルまたはローカルホストアドレスを使用する必要があります。 }}
        *   {{ 設定ファイルの URL は HTTPS プロトコルまたはローカルホストアドレスを使用する必要があります。 }}
    fetch_failed: 設定ファイルを読み込めませんでした。
    # {$status} is the HTTP status code returned while fetching the config file
    fetch_failed_not_ok: HTTP レスポンスがステータス {$status} で返されました。
    # Don’t localize `config.yml`, `load_config_file: false`, and `CMS.init()`
    fetch_failed_with_manual_init: '設定ファイルを取得できませんでした。`config.yml` ファイルの読み込みを防ぐには、`CMS.init()` に渡される設定オブジェクトに <a>`load_config_file: false`</a> を追加してください。'
    parse_failed: 設定ファイルを解析できませんでした。
    parse_failed_invalid_object: 設定ファイルが有効な JavaScript オブジェクトではありません。
    parse_failed_unsupported_type: 設定ファイルが有効なファイル形式ではありません。サポートされているのは YAML、TOML と JSON のみです。
    no_collection: コレクションが定義されていません。
    missing_backend: バックエンドが定義されていません。
    missing_backend_name: バックエンド名が定義されていません。
    # {$name} is the backend name from the CMS configuration
    unsupported_known_backend: '{$name} バックエンドは Sveltia CMS では <a>非対応です</a>。'
    # {$name} is the backend name from the CMS configuration
    unsupported_deprecated_backend: 廃止予定の {$name} バックエンドは Sveltia CMS では <a>非対応です</a>。
    unsupported_custom_backend: カスタムバックエンドは Sveltia CMS では <a>非対応です</a>。
    unsupported_backend_suggestion: <a>サポートされているバックエンド</a> のいずれかを使用してください。
    missing_repository: レポジトリが定義されていません。
    invalid_repository: 設定されているレポジトリが正しくありません。この設定は「owner/repo」形式でなければなりません。
    oauth_implicit_flow: 設定されている認証方式 (暗黙的フロー) は Sveltia CMS では非対応です。代わりに他の <a>認証方法</a> を使用してください。
    github_pkce_unsupported: GitHub の制約により PKCE 認証はまだサポートされていません。代わりに他の <a>認証方法</a> を使用してください。
    oauth_no_app_id: ' OAuth アプリケーション ID が定義されていません。'
    # Don’t localize `auth_methods`
    no_auth_methods: '`auth_methods` オプションには少なくとも 1 つの認証方法を含める必要があります。'
    missing_media_folder: メディアフォルダーが定義されていません。
    invalid_media_folder: 設定されているメディアフォルダーが正しくありません。この設定は文字列でなければなりません。
    invalid_public_folder: 設定されているパブリックフォルダーが正しくありません。この設定は文字列でなければなりません。
    public_folder_relative_path: 設定されているパブリックフォルダーが正しくありません。この設定は「/」で始まる絶対パスでなければなりません。
    public_folder_absolute_url: パブリックフォルダーオプションの絶対 URL は Sveltia CMS では非対応です。
    # Don’t localize `asset_collections`
    invalid_asset_collections: '`asset_collections` オプションが正しくありません。配列である必要があります。'
    # {$count} is the 1-based asset collection index in the configuration array. Don’t localize `name`
    missing_asset_collection_name: アセットコレクション {$count} には `name` オプションを空でない文字列として定義する必要があります。
    # {$name} is the invalid or duplicate asset collection name
    invalid_asset_collection_name: アセットコレクション名 `{$name}` は無効です。特殊文字を含めることはできません。
    # {$name} is the duplicate asset collection name
    duplicate_asset_collection_name: アセットコレクション名は一意でなければなりませんが、`{$name}` が複数回使用されています。
    # Don’t localize `media_folder`
    asset_collection_invalid_media_folder: '`{$name}` アセットコレクションには、`media_folder` オプションを文字列として定義する必要があります。'
    # Don’t localize `folder`, `files`, and `divider`
    invalid_collection_no_options: コレクションは `folder`、`files`、`divider` オプションのいずれかを定義する必要があります。
    # Don’t localize `folder`, `files`, and `divider`
    invalid_collection_multiple_options: コレクションは `folder`、`files`、`divider` オプションを同時に持つことはできません。
    # {$extension} is the file extension and {$format} is the configured content format
    file_format_mismatch: 拡張子 `{$extension}` は `{$format}` 形式と一致しません。
    # {$slug} is the invalid slug template from the configuration; Don’t localize `path` and `slug`
    invalid_slug_slash: スラッグテンプレート `{$slug}` は無効です。スラッシュを含めることはできません。エントリーをサブフォルダーに整理するには、`slug` の代わりに `path` オプションを使用してください。
    # {$count} is the 1-based collection index in the configuration array; Don’t localize `name`
    missing_collection_name: コレクション {$count} には `name` オプションを空でない文字列として定義する必要があります。
    # {$name} is the invalid or duplicate collection name
    invalid_collection_name: コレクション名 `{$name}` は無効です。特殊文字を含めることはできません。
    duplicate_collection_name: コレクション名は一意でなければなりませんが、`{$name}` が複数回使用されています。
    # {$count} is the 1-based file index inside a file collection; Don’t localize `name`
    missing_collection_file_name: コレクションファイル {$count} には `name` オプションを空でない文字列として定義する必要があります。
    # {$name} is the invalid or duplicate collection file name
    invalid_collection_file_name: コレクションファイル名 `{$name}` は無効です。特殊文字を含めることはできません。
    duplicate_collection_file_name: コレクションファイル名は一意でなければなりませんが、`{$name}` が複数回使用されています。
    # Don’t localize `fields`
    collection_no_fields: コレクションには少なくとも 1 つのフィールドを定義する必要があります。
    # Don’t localize `fields`
    collection_file_no_fields: コレクションファイルには少なくとも 1 つのフィールドを定義する必要があります。
    # Don’t localize `i18n`, `locale` and `file`
    collection_file_i18n_required: コレクションファイルには、`file` パスで `locale` プレースホルダーを使用する場合、`i18n` オプションを定義する必要があります。
    # {$count} is the 1-based field index in the current fields array; Don’t localize `name`
    missing_field_name: フィールド {$count} には `name` オプションを空でない文字列として定義する必要があります。
    # {$name} is the invalid or duplicate field name
    invalid_field_name: フィールド名 `{$name}` は無効です。特殊文字を含めることはできません。ネストされたフィールドを作成したい場合は、<a>ドット表記ではなくオブジェクトフィールドを使用してください</a>。
    duplicate_field_name: フィールド名は一意でなければなりませんが、`{$name}` が複数回使用されています。
    # {$count} is the 1-based variable type index in the current types array
    missing_variable_type: 変数タイプ {$count} には `name` オプションを空でない文字列として定義する必要があります。
    # {$name} is the invalid or duplicate variable type name
    invalid_variable_type: 変数タイプ名 `{$name}` は無効です。特殊文字を含めることはできません。
    duplicate_variable_type: 変数タイプ名は一意でなければなりませんが、`{$name}` が複数回使用されています。
    date_field_type: 'Sveltia CMS では非推奨の Date フィールドタイプはサポートされていません。代わりに `type: date` オプション付きの DateTime フィールドタイプを使用してください。'
    # {$timeZone} is the invalid IANA timezone identifier from the configuration
    invalid_timezone: '無効なタイムゾーン: {$timeZone}。有効な IANA タイムゾーン識別子を使用してください。例: `America/New_York` または `Asia/Tokyo`。'
    # {$prop} is the deprecated option name and {$newProp} is the supported replacement option
    unsupported_deprecated_option: Sveltia CMS では非推奨の `{$prop}` オプションはサポートされていません。代わりに `{$newProp}` オプションを使用してください。
    # Don’t localize `allow_multiple`, `multiple`, and `false`
    allow_multiple: Sveltia CMS では `allow_multiple` オプションはサポートされていません。代わりにデフォルトで `false` の `multiple` オプションを使用してください。
    # Don’t localize `field`, `fields`, and `types`
    invalid_list_field: List フィールドは `field`、`fields`、`types` オプションを同時に持つことはできません。
    # {$widget} is the configured widget value of the invalid variable type; Don’t localize `widget` and `object`
    invalid_list_variable_type: List フィールドの変数タイプが無効です。`widget` オプションは `{$widget}` に設定されていますが、`object` でなければなりません。
