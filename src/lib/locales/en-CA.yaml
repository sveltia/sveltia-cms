  .input {$count :integer}
  .match $count
    one {{ This file will be saved to the “{$folder}” folder: }}
    *   {{ These {$count} files will be saved to the “{$folder}” folder: }}

# File size validation
# Warning section for files exceeding size limits
oversized_files: Oversized Files
# {$size} is the maximum allowed file size and {$count} is the number of oversized files
warning_oversized_files: |
  .input {$count :integer}
  .match $count
    one {{ This file cannot be uploaded because it exceeds the maximum size of {$size}. Please reduce the size or select a different file. }}
    *   {{ These files cannot be uploaded because they exceed the maximum size of {$size}. Please reduce the sizes or select different files. }}

# File name conflict resolution
# {$count} is the number of conflicting file names in the target folder
file_name_conflict_confirmation: |
  .input {$count :integer}
  .match $count
    one {{ A file with the same name already exists in this folder. Do you want to replace it? }}
    *   {{ {$count} files with the same names already exist in this folder. Do you want to replace them? }}
# {$name} is the conflicting file name when there is exactly one conflict; {$count} is the total conflict count
file_name_conflict_confirmation_with_name: |
  .input {$count :integer}
  .input {$name :string}
  .match $count
    one {{ A file named “{$name}” already exists in this folder. Do you want to replace it? }}
    *   {{ {$count} files with the same names already exist in this folder. Do you want to replace them? }}
file_name_conflict_resolution: File Name Conflict Resolution
# Option to keep both files (rename the new one)
keep_both: Keep Both

# Upload progress and error messages
uploading_files_progress: Uploading…
uploading_files_failed: Upload failed.

