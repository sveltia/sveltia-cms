# Entry creation restrictions: tooltip and advisory messages
creating_entries_disabled_by_admin: Creating new entries in this collection is disabled by the administrator.
# {$quota} is the collection’s maximum entry count
creating_entries_disabled_by_quota: You cannot add new entries to this collection because it has reached its limit of {$quota} entries.
# {$quota} is the collection limit and {$remaining} is the number of entries that can still be created
