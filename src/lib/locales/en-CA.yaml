x_entries: |
  .input {$count :integer}
  .match $count
    0   {{ No entries }}
    one {{ {$count} entry }}
    *   {{ {$count} entries }}
# {$count} is the number of matching assets
x_assets: |
  .input {$count :integer}
  .match $count
    0   {{ No assets }}
    one {{ {$count} asset }}
    *   {{ {$count} assets }}

# Empty state messages
