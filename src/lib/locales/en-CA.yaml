  .input {$remaining :integer}
  .match $remaining
    one {{ This collection is nearing its limit of {$quota} entries. You can only create {$remaining} more entry. }}
    *   {{ This collection is nearing its limit of {$quota} entries. You can only create {$remaining} more entries. }}

