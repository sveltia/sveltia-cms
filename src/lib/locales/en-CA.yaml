# {$terms} is the current search query text
search_results_for_x: Search Results for “{$terms}”

# Search result announcements (ARIA live regions)
# Entry search results with counts
# {$terms} is the search query and {$count} is the number of matching entries
viewing_entry_search_results: |
  .input {$count :integer}
  .match $count
    0   {{ You’re now viewing search results for “{$terms}”. We couldn’t find any entries. }}
    one {{ You’re now viewing search results for “{$terms}”. We’ve found one entry. }}
    *   {{ You’re now viewing search results for “{$terms}”. We’ve found {$count} entries. }}
# Asset search results with counts
# {$terms} is the search query and {$count} is the number of matching assets
viewing_asset_search_results: |
  .input {$count :integer}
  .match $count
    0   {{ You’re now viewing search results for “{$terms}”. We couldn’t find any assets. }}
    one {{ You’re now viewing search results for “{$terms}”. We’ve found one asset. }}
    *   {{ You’re now viewing search results for “{$terms}”. We’ve found {$count} assets. }}

# Result count labels
# Used in search result headings to show counts
