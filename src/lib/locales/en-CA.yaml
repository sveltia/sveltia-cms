# ==============================================================================
# Field Validation
# ==============================================================================
# Inline validation error messages for form fields.

validation:
  # Required field missing
  value_missing: This field is required.

  # Minimum value/count not met
  range_underflow:
    # {$min} is the minimum allowed value, already formatted for the input type
    datetime-local: The date/time must be at or after {$min}.
    date: The date must be on or after {$min}.
    time: The time must be at or after {$min}.
    number: The value must be greater than or equal to {$min}.
    # {$min} is the minimum number of selected options
    select: |
      .input {$min :integer}
      .match $min
        one {{ You must select at least {$min} option. }}
        *   {{ You must select at least {$min} options. }}
    # {$min} is the minimum number of list items
    add: |
      .input {$min :integer}
      .match $min
        one {{ You must add at least {$min} item. }}
        *   {{ You must add at least {$min} items. }}

  # Maximum value/count exceeded
  range_overflow:
    # {$max} is the maximum allowed value, already formatted for the input type
    datetime-local: The date/time must be at or before {$max}.
    date: The date must be on or before {$max}.
    time: The time must be at or before {$max}.
    number: The value must be less than or equal to {$max}.
    # {$max} is the maximum number of selected options
    select: |
      .input {$max :integer}
      .match $max
        one {{ You cannot select more than {$max} option. }}
        *   {{ You cannot select more than {$max} options. }}
    # {$max} is the maximum number of list items
    add: |
      .input {$max :integer}
      .match $max
        one {{ You cannot add more than {$max} item. }}
        *   {{ You cannot add more than {$max} items. }}

  # String length constraints
  # {$min :integer} and {$max :integer} are character-count limits
  too_short: |
    .input {$min :integer}
    .match $min
      one {{ You must enter at least {$min} character. }}
      *   {{ You must enter at least {$min} characters. }}
  too_long: |
    .input {$max :integer}
    .match $max
      one {{ You cannot enter more than {$max} character. }}
      *   {{ You cannot enter more than {$max} characters. }}

  # Type validation errors
  type_mismatch:
    number: Please enter a number.
    email: Please enter a valid email.
    url: Please enter a valid URL.

