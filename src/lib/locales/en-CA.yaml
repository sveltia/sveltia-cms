# ==============================================================================
# Configuration Validation
# ==============================================================================
# Error and warning messages for CMS configuration validation.

config:
  # Error count notice on entrance page
  # {$count} is the number of configuration errors found
  errors: |
    .input {$count :integer}
    .match $count
      one {{ There is an error in the CMS configuration. Please solve the issue and try again. }}
      *   {{ There are errors in the CMS configuration. Please solve the issues and try again. }}

  # Error location prefixes
  error_locator:
    # {$collection}, {$file}, {$component}, and {$field} are the offending config item names
    collection: '{$collection} collection'
    file: '{$file} file'
    component: '{$component} component'
    # Don’t localize `{$field}`
    field: '`{$field}` field'

  # Configuration error messages
  error:
    no_secure_context: Sveltia CMS only works with HTTPS or localhost URLs.
    # {$count} is the number of insecure configuration file URLs
    insecure_urls: |
      .input {$count :integer}
      .match $count
        one {{ The configuration file URL must use HTTPS protocol or a localhost address. }}
        *   {{ The configuration file URLs must use HTTPS protocol or localhost addresses. }}
    fetch_failed: The configuration file could not be retrieved.
    # {$status} is the HTTP status code returned while fetching the config file
    fetch_failed_not_ok: HTTP response returned with status {$status}.
    # Don’t localize `config.yml`, `load_config_file: false`, and `CMS.init()`
    fetch_failed_with_manual_init: 'The configuration file could not be retrieved. To prevent the `config.yml` file from loading, add <a>`load_config_file: false`</a> to the configuration object passed to `CMS.init()`.'
    parse_failed: The configuration file could not be parsed.
    parse_failed_invalid_object: The configuration file is not a valid JavaScript object.
    parse_failed_unsupported_type: The configuration file is not a valid file type. Only YAML, TOML and JSON are supported.
    no_collection: Collections are not defined.
    missing_backend: The backend is not defined.
    missing_backend_name: The backend name is not defined.
    # {$name} is the backend name from the CMS configuration
    unsupported_known_backend: The {$name} backend is <a>not supported</a> in Sveltia CMS.
    # {$name} is the backend name from the CMS configuration
    unsupported_deprecated_backend: The deprecated {$name} backend is <a>not supported</a> in Sveltia CMS.
    unsupported_custom_backend: Custom backends are <a>not supported</a> in Sveltia CMS.
    unsupported_backend_suggestion: Use one of the <a>supported backends</a> instead.
    missing_repository: The repository is not defined.
    invalid_repository: The configured repository is invalid. It must be in “owner/repo” format.
    oauth_implicit_flow: The configured authentication method (implicit flow) is not supported in Sveltia CMS. Use a different <a>authentication method</a> instead.
    github_pkce_unsupported: PKCE authorization is not yet supported due to GitHub’s limitations. Use a different <a>authentication method</a> instead.
    oauth_no_app_id: OAuth application ID is not defined.
    # Don’t localize `auth_methods`
    no_auth_methods: The `auth_methods` option must contain at least one method.
    missing_media_folder: The media folder is not defined.
    invalid_media_folder: The configured media folder is invalid. It must be a string.
    invalid_public_folder: The configured public folder is invalid. It must be a string.
    public_folder_relative_path: The configured public folder is invalid. It must be an absolute path starting with “/”.
    public_folder_absolute_url: An absolute URL for the public folder option is not supported in Sveltia CMS.
    # Don’t localize `asset_collections`
    invalid_asset_collections: The `asset_collections` option is invalid. It must be an array.
    # {$count} is the 1-based asset collection index in the configuration array. Don’t localize `name`
    missing_asset_collection_name: The asset collection {$count} must have the `name` option defined as a non-empty string.
    # {$name} is the invalid or duplicate asset collection name
    invalid_asset_collection_name: The asset collection name `{$name}` is invalid. It must not contain special characters.
    # {$name} is the duplicate asset collection name
    duplicate_asset_collection_name: Asset collection names must be unique, but `{$name}` is used more than once.
    # Don’t localize `media_folder`
    asset_collection_invalid_media_folder: The `{$name}` asset collection must have the `media_folder` option defined as a string.
    # Don’t localize `folder`, `files`, and `divider`
    invalid_collection_no_options: The collection must have either the `folder`, `files` or `divider` option defined.
    # Don’t localize `folder`, `files`, and `divider`
    invalid_collection_multiple_options: The collection cannot have the `folder`, `files` and `divider` options together.
    # {$extension} is the file extension and {$format} is the configured content format
    file_format_mismatch: The `{$extension}` extension doesn’t match the `{$format}` format.
    # {$slug} is the invalid slug template from the configuration; Don’t localize `path` and `slug`
    invalid_slug_slash: The slug template `{$slug}` is invalid as it cannot contain slashes. To organize entries in subfolders, use the `path` option instead of `slug`.
    # {$count} is the 1-based collection index in the configuration array; Don’t localize `name`
    missing_collection_name: The collection {$count} must have the `name` option defined as a non-empty string.
    # {$name} is the invalid or duplicate collection name
    invalid_collection_name: The collection name `{$name}` is invalid. It must not contain special characters.
    duplicate_collection_name: Collection names must be unique, but `{$name}` is used more than once.
    # {$count} is the 1-based file index inside a file collection; Don’t localize `name`
    missing_collection_file_name: The collection file {$count} must have the `name` option defined as a non-empty string.
    # {$name} is the invalid or duplicate collection file name
    invalid_collection_file_name: The collection file name `{$name}` is invalid. It must not contain special characters.
    duplicate_collection_file_name: Collection file names must be unique, but `{$name}` is used more than once.
    # Don’t localize `fields`
    collection_no_fields: The collection must have the `fields` option defined with at least one field.
    # Don’t localize `fields`
    collection_file_no_fields: The collection file must have the `fields` option defined with at least one field.
    # Don’t localize `i18n`, `locale` and `file`
    collection_file_i18n_required: The collection file must have the `i18n` option defined if the `locale` placeholder is used in the `file` path.
    # {$count} is the 1-based field index in the current fields array; Don’t localize `name`
    missing_field_name: The field {$count} must have the `name` option defined as a non-empty string.
    # {$name} is the invalid or duplicate field name
    invalid_field_name: The field name `{$name}` is invalid. It must not contain special characters. If you want to nest fields, <a>use Object fields instead of dot notation</a>.
    duplicate_field_name: Field names must be unique, but `{$name}` is used more than once.
    # {$count} is the 1-based variable type index in the current types array
    missing_variable_type: The variable type {$count} must have the `name` option defined as a non-empty string.
    # {$name} is the invalid or duplicate variable type name
    invalid_variable_type: The variable type name `{$name}` is invalid. It must not contain special characters.
    duplicate_variable_type: Variable type names must be unique, but `{$name}` is used more than once.
    date_field_type: 'The deprecated Date field type is not supported in Sveltia CMS. Use the DateTime field type with the `type: date` option instead.'
    # {$timeZone} is the invalid IANA timezone identifier from the configuration
    invalid_timezone: 'Invalid timezone: {$timeZone}. Must be a valid IANA timezone identifier like `America/New_York` or `Asia/Tokyo`.'
    # {$prop} is the deprecated option name and {$newProp} is the supported replacement option
    unsupported_deprecated_option: The deprecated `{$prop}` option is not supported in Sveltia CMS. Use the `{$newProp}` option instead.
    # Don’t localize `allow_multiple`, `multiple`, and `false`
    allow_multiple: The `allow_multiple` option is not supported in Sveltia CMS. Use the `multiple` option instead, which defaults to `false`.
    # Don’t localize `field`, `fields`, and `types`
    invalid_list_field: The List field cannot have the `field`, `fields` and `types` options together.
    # {$widget} is the configured widget value of the invalid variable type; Don’t localize `widget` and `object`
    invalid_list_variable_type: The List field’s variable type is invalid. The `widget` option is set to `{$widget}` but it must be `object`.
    # Don’t localize `fields`, and `types`
    invalid_object_field: The Object field cannot have the `fields` and `types` options together.
    # Don’t localize `fields`, and `types`
    object_field_missing_fields: The Object field must have either the `fields` or `types` option defined.
    # {$collection}, {$file}, and {$field} are referenced names that could not be resolved
    relation_field_invalid_collection: The referenced `{$collection}` collection is invalid or not defined.
    relation_field_invalid_collection_file: The referenced `{$file}` file is invalid or not defined.
    # Don’t localize `file`
    relation_field_missing_file_name: The `file` option must be defined for a relation to a file collection.
    relation_field_invalid_value_field: The referenced value field `{$field}` is invalid or not defined.
    unexpected: Unexpected error

  # Warning messages (logged to console)
  warning:
    oauth_no_app_id: OAuth application ID is not defined. Users are required to provide an access token to sign in.
    editorial_workflow_unsupported: Editorial workflow is not yet supported in Sveltia CMS.
    open_authoring_unsupported: Open authoring is not yet supported in Sveltia CMS.
    nested_collections_unsupported: Nested collections are not yet supported in Sveltia CMS.
    # {$prop} is the unsupported option name that will be ignored
    unsupported_ignored_option: The `{$prop}` option is not supported in Sveltia CMS. It will be ignored.
    # Don’t localize `picker_utc`, `input_timezone`, and `output_utc`
    conflicting_timezone_options: Both `picker_utc` and newer timezone options (`input_timezone` or `output_utc`) are set. The new options take precedence. Consider removing `picker_utc` from your configuration.

  # Compatibility link appended to unsupported feature messages
  compatibility_link: 'See the compatibility notes for details: {$link}'

  # Console tip shown after config load
  schema_tip: For a better developer experience, you can validate your configuration file against the JSON schema of Sveltia CMS. See {$link} for details.

